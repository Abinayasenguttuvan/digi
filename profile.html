<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Marketing Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  overflow-x:hidden;
}

/* Layout */
.dashboard{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
}
.sidebar h2{
  text-align:center;
  color:#00ffd5;
  margin-bottom:30px;
}
.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:10px 0;
  text-decoration:none;
  color:#ccc;
  border-radius:10px;
  transition:0.3s;
}
.sidebar a:hover{
  background:#00ffd5;
  color:#000;
}

/* Main */
.main{flex:1;padding:20px;}

/* Topbar */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}
.user-info{display:flex;gap:10px;align-items:center;}

/* Sections */
.section{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:15px;
  margin-bottom:20px;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;
}
.section.show{
  opacity:1;
  transform:translateY(0);
}

.section h3{
  color:#00ffd5;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00ffd5;
  color:#000;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
button:hover{
  background:#00aaff;
}

/* Error message */
.error{
  color:#ff4d4d;
  margin-bottom:10px;
  display:none;
}

/* Responsive */
@media(max-width:992px){
  .dashboard{flex-direction:column;}
  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
  }
  .sidebar h2{display:none;}
  .sidebar a{flex:1;justify-content:center;}
}

@media(max-width:600px){
  .topbar{flex-direction:column;gap:10px;}
  .section{padding:15px;}
}
</style>
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->
<div class="sidebar">
  <h2>StacklyDigital</h2>
  <a href="./client.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="./alert.html"><i class="fas fa-bell"></i> Alerts</a>
    <a href="./report.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="./profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="./login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Main -->
<div class="main">

<div class="topbar">
  <h3>Digital Marketing Profile</h3>
  <div class="user-info">
    <i class="fas fa-user-circle"></i>
    <span>User</span>
  </div>
</div>

<!-- Profile Section -->
<div class="section" id="profileSection">
  <h3>Profile Information</h3>

  <div class="error" id="profileError">⚠ Please fill all details</div>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="tel" id="phone" placeholder="Enter Phone">

  <button onclick="validateProfile()">Save Profile</button>
</div>

<!-- Password Section -->
<div class="section" id="passwordSection">
  <h3>Change Password</h3>

  <div class="error" id="passError">⚠ Please fill all details</div>

  <input type="password" id="currentPass" placeholder="Current Password">
  <input type="password" id="newPass" placeholder="New Password">
  <input type="password" id="confirmPass" placeholder="Confirm Password">

  <button onclick="validatePassword()">Update Password</button>
</div>

</div>
</div>

<script>

/* Scroll Animation */
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('show');
    }
  });
});

/* Profile Validation */
function validateProfile(){
  let name = document.getElementById('name').value.trim();
  let email = document.getElementById('email').value.trim();
  let phone = document.getElementById('phone').value.trim();

  if(!name || !email || !phone){
    document.getElementById('profileError').style.display='block';
  }else{
    window.location.href="404.html";
  }
}

/* Password Validation */
function validatePassword(){
  let c = document.getElementById('currentPass').value.trim();
  let n = document.getElementById('newPass').value.trim();
  let cp = document.getElementById('confirmPass').value.trim();

  if(!c || !n || !cp){
    document.getElementById('passError').style.display='block';
    return;
  }

  if(n !== cp){
    document.getElementById('passError').innerText="⚠ Passwords do not match";
    document.getElementById('passError').style.display='block';
    return;
  }

  window.location.href="404.html";
}

</script>

</body>
</html>
