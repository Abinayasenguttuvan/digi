<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Security Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Reset */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

    html, body {
      height:100%;
      overflow: hidden;
    }

    body {
      display:flex;
      justify-content:center;
      align-items:center;
      background: url('./di2.webp') no-repeat center center/cover;
      position: relative;
    }

    /* Overlay */
    body::before {
      content: '';
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      z-index:0;
    }

    /* Container */
    .container {
      position: relative;
      z-index:1;
      display: flex;
      width: 90%;
      max-width: 1000px;
      backdrop-filter: blur(15px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }

    /* Left side - form */
    .login-left {
      flex: 1;
      padding: 50px 40px;
      background: rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .login-left h2 {
      color: #00ff99;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff99;
    }

    .form-group { margin-bottom: 20px; display:flex; flex-direction:column; }
    .form-group label { margin-bottom:5px; font-size:14px; color:#c0c0c0; }
    .form-group input, .form-group select {
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      background: rgba(255,255,255,0.1);
      color:#fff;
      transition: 0.3s;
    }
    .form-group input:focus, .form-group select:focus { background: rgba(255,255,255,0.2); } 

    .remember-forgot {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      color:#c0c0c0;
      margin-bottom:20px;
    }
    .remember-forgot a { color:#00ff99; text-decoration:none; transition:0.3s; }
    .remember-forgot a:hover { text-decoration:underline; }

    .btn {
      padding:14px;
      width:100%;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#00ff99,#0077ff);
      color:#000;
      font-weight:bold;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
      box-shadow:0 0 20px rgba(0,255,255,0.5);
    }
    .btn:hover {
      background: linear-gradient(90deg,#0077ff,#00ff99;);
      box-shadow:0 0 30px rgba(0,255,255,0.8);
      transform:translateY(-2px);
    }

    .signup { text-align:center; font-size:14px; margin-top:15px; color:white;}
    .signup a { color:#00ff99; text-decoration:none; font-weight:bold; transition:0.3s; }
    .signup a:hover { text-decoration:underline; }

    /* Right side - logo + reviews */
    .login-right {
      flex: 1;
      background: rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
      backdrop-filter: blur(15px);
      position:relative;
    }

    .login-right img {
      width:120px;
      margin-bottom:30px;
      border-radius:50%;
      box-shadow:0 0 20px #00ff99;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .reviews { font-size:14px; line-height:1.5; color:#c0c0c0; }
    .reviews p { margin-bottom:15px; font-style:italic; }

    /* Responsive */
    @media (max-width:768px){
      .container { flex-direction:column; border-radius:15px; }
      .login-left, .login-right { padding:30px 20px; }
      .login-right img { margin-bottom:20px; }
    }

    select option {
  background-color: #1e1e2f;  /* solid dark background */
  color: #ffffff;             /* always visible text */
}

select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

select option {
  background: #1e1e2f;
  color: #fff;
}
    

  </style>
</head>
<body>
  

<div class="container">

  
  <!-- Left side - form -->
  <div class="login-left">
    <a href="index.html" class="cyber-back" style="color: #00ff99;; margin-top: 10px;">
      <i class="fa fa-arrow-left"></i> Back to Home
      </a><br><br>
    <h2>Login to Cyber Security</h2>
    <div class="form-group">
      <label for="accountType">Account Type</label>
      <select id="accountType">
        <option value="client">Client</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    <div class="remember-forgot">
      <label><input type="checkbox" id="remember"> Remember me</label>
      <a href="./404,html">Forgot Password?</a>
    </div>
    <button class="btn" onclick="login()">Login</button>
    <div class="signup">Don't have an account? <a href="./register.html">Register now</a></div>
  </div>

  <!-- Right side - logo + reviews -->
  <div class="login-right">
    <img src="./logo.webp" alt="Cyber Security Logo">
    <div class="reviews">
      <p>"Excellent security services! Highly recommend."</p>
      <p>"Professional team and fast support."</p>
      <p>"Our data has never been safer."</p>
    </div>
  </div>
</div>

<script>
  
  // Check if already logged in
  window.onload = () => {
    const loggedUser = localStorage.getItem('loggedUser') || sessionStorage.getItem('loggedUser');
    if(loggedUser){
      const user = JSON.parse(loggedUser);
      alert(`Already logged in as ${user.email} (${user.accountType})`);
      // Redirect based on account type
      if(user.accountType === 'admin'){
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html'; // client page
      }
    }
  }

  function login(){
    const accountType = document.getElementById('accountType').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;

    if(email === '' || password === ''){
      alert('Please enter email and password');
      return;
    }

    const user = { email, accountType };

    // Store in localStorage or sessionStorage
    if(remember){
      localStorage.setItem('loggedUser', JSON.stringify(user));
    } else {
      sessionStorage.setItem('loggedUser', JSON.stringify(user));
    }

    alert(`Logged in as ${email} (${accountType})`);

    // Redirect based on account type
    if(accountType === 'admin'){
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'client.html';
    }
  }





</script>


</body>
</html>
