<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#050807;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

/* GLOW BG */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle at center, #266e65, #2d610a);
  filter:blur(120px);
  opacity:0.2;
}

/* CONTAINER */
.container{
  text-align:center;
  z-index:2;
  padding:20px;
}

/* 404 */
.error-code{
  font-size:120px;
  color:#2d610a;
  font-weight:800;
}

/* TEXT */
h1{margin:20px 0;}
p{color:#bbb;margin-bottom:30px;}

/* BUTTON */
.btn{
  display:inline-block;
  padding:14px 32px;
  background:#2d610a;
  color:#000;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
  cursor:pointer;
}

/* HOVER */
.btn:hover{
  box-shadow:0 0 20px #2d610a;
}

/* CLICK EFFECT */
.btn.clicked{
  transform:scale(0.95);
  background:#fff;
}

/* MOBILE */
@media(max-width:576px){
  .error-code{font-size:70px;}
  h1{font-size:22px;}
  p{font-size:14px;}
}

</style>
</head>

<body>

<div class="container">

  <div class="error-code">404</div>

  <h1>Page Not Found</h1>

  <p>
    The page you’re looking for doesn’t exist.<br>
    Let’s get you back home.
  </p>

  <!-- BUTTON -->
  <a href="index.html" class="btn" onclick="goHome(event,this)">
    ← Back to Home
  </a>

</div>

<script>

/* SAFE REDIRECT */
function goHome(e,btn){
  e.preventDefault(); // stop instant jump

  btn.classList.add("clicked");

  setTimeout(()=>{
    window.location.href = "index.html";
  },300);
}

</script>





</body>
</html>
